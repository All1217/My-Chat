server:
  port: 8100
  address: 0.0.0.0
spring:
  application:
    name: my-chat
  ai:
    openai:
      base-url: https://api.deepseek.com
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: deepseek-v4-flash
          temperature: 0.5      # 控制随机性（0-2）
          max-tokens: 4096      # 最大输出token数
#          top-p: 1.0            # 核采样参数
#          frequency-penalty: 0  # 频率惩罚
#          presence-penalty: 0   # 存在惩罚
#      embedding:
#        options:
#          model: text-embedding-v3
#          dimensions: 1024
      client:
        connect-timeout: 30s    # 连接超时
        read-timeout: 60s       # 读取超时
  datasource:
#    driver-class-name: com.mysql.cj.jdbc.Driver
#    url: jdbc:mysql://localhost:3306/db01?serverTimezone=Asia/Shanghai&useSSL=false&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&tinyInt1isBit=false&allowPublicKeyRetrieval=true&allowMultiQueries=true&useServerPrepStmts=false
#    username: root
#    password: 123456
    url: jdbc:h2:file:./data/mychatdb;AUTO_SERVER=TRUE  # 文件模式
#    url: jdbc:h2:mem:mychatdb  # 内存模式
    driver-class-name: org.h2.Driver
    username: root
    password:
  h2:
    console:
      enabled: true  # 开发时开启Web控制台
      path: /h2-console
  sql:
    init:
      schema-locations: classpath:schema.sql
      mode: always  # 总是初始化
      continue-on-error: true  # 出错继续
logging:
  level:
    org.springframework.ai: debug
    com.mychat: debug